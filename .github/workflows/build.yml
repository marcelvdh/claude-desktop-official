name: Build

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:
    outputs:
      artifact-name:
        description: Name of the uploaded package artifact
        value: ${{ jobs.build.outputs.artifact-name }}

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:latest
    outputs:
      artifact-name: claude-desktop-official-pkg
    steps:
      - name: Install toolchain
        run: pacman -Syu --noconfirm --needed base-devel pacman-contrib namcap git sudo

      - uses: actions/checkout@v4

      - name: Prepare build user
        run: |
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build and lint
        run: sudo -H -u builder bash -c "cd '$GITHUB_WORKSPACE' && bash scripts/build.sh"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-desktop-official-pkg
          path: ${{ github.workspace }}/*.pkg.tar.zst
          if-no-files-found: error
