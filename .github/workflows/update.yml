name: Nightly update

on:
  schedule:
    - cron: '0 23 * * *'                # 23:00 UTC (23:00 GMT / 00:00 BST in London)
  workflow_dispatch:
    inputs:
      dry_run:
        description: Build but do not open a PR
        type: boolean
        default: true
      force:
        description: Proceed even if already up to date (bumps pkgrel to force a testable PR)
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: nightly-update

jobs:
  update:
    runs-on: ubuntu-latest
    container: archlinux:latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Install toolchain
        run: pacman -Syu --noconfirm --needed base-devel pacman-contrib namcap git sudo github-cli

      - uses: actions/checkout@v4

      - name: Prepare build user
        run: |
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Detect versions
        id: detect
        run: |
          current="$(grep -oP '^pkgver=\K.*' PKGBUILD)"
          latest="$(bash scripts/latest-version.sh)"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "Current: $current   Latest: $latest"

      - name: Decide what to do
        id: guard
        env:
          current: ${{ steps.detect.outputs.current }}
          latest: ${{ steps.detect.outputs.latest }}
          dry: ${{ github.event.inputs.dry_run == 'true' }}
          force: ${{ github.event.inputs.force == 'true' }}
        run: |
          newest="$(printf '%s\n%s\n' "$current" "$latest" | sort -V | tail -1)"
          if [[ "$current" != "$latest" && "$newest" == "$latest" ]]; then
            pkgver="$latest"; pkgrel=1; branch="autoupdate/$latest"; title="Update to $latest"
          elif [[ "$force" == "true" ]]; then
            pkgver="$current"; pkgrel="$GITHUB_RUN_NUMBER"
            branch="force-test/$current-$GITHUB_RUN_NUMBER"; title="Force test build $current-$GITHUB_RUN_NUMBER"
          else
            echo "Already up to date."; exit 0
          fi
          {
            echo "pkgver=$pkgver"; echo "pkgrel=$pkgrel"
            echo "branch=$branch"; echo "title=$title"; echo "build=true"
          } >> "$GITHUB_OUTPUT"
          if [[ "$dry" == "true" ]]; then
            echo "Dry run: building only, no PR."
          elif [[ "$branch" == autoupdate/* ]] && git ls-remote --exit-code --heads origin "refs/heads/$branch" >/dev/null 2>&1; then
            echo "Branch $branch already exists; skipping PR."
          else
            echo "pr=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump and build
        if: steps.guard.outputs.build == 'true'
        run: sudo -H -u builder bash -c "cd '$GITHUB_WORKSPACE' && bash scripts/bump.sh '${{ steps.guard.outputs.pkgver }}' '${{ steps.guard.outputs.pkgrel }}'"

      - name: Open pull request
        if: steps.guard.outputs.pr == 'true'
        env:
          branch: ${{ steps.guard.outputs.branch }}
          title: ${{ steps.guard.outputs.title }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add PKGBUILD .SRCINFO
          git commit -m "$title"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -u origin "$branch"
          gh pr create --base main --head "$branch" --title "$title" --body "$title"

      - name: Upload built package
        if: steps.guard.outputs.build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: claude-desktop-official-${{ steps.guard.outputs.pkgver }}-${{ steps.guard.outputs.pkgrel }}
          path: ${{ github.workspace }}/*.pkg.tar.zst
          if-no-files-found: error

      - name: Report failure
        if: failure()
        run: |
          title="Nightly update failed on $(date -u +%Y-%m-%d)"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          gh issue list --state open --search "$title in:title" | grep -q . \
            || gh issue create --title "$title" --body "The nightly update failed: $run_url"
